<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oil Market Dashboard — DSNCON</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1923; --card: #1a2d3d; --text: #e0e6ed;
    --muted: #8899aa; --accent: #E63946; --accent2: #457B9D;
    --accent3: #2A9D8F; --warn: #F4A261; --border: #2a3d4f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
  .header p { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .badge-red { background: rgba(230,57,70,0.2); color: var(--accent); }
  .badge-live { background: rgba(42,157,143,0.2); color: var(--accent3); }
  .btn {
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--card); color: var(--text); cursor: pointer; font-size: 12px;
  }
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px; margin-bottom: 12px;
  }
  .stat {
    background: var(--card); border-radius: 8px; padding: 12px;
    border: 1px solid var(--border);
  }
  .stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .val { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .stat .chg { font-size: 11px; margin-top: 1px; }
  .up { color: var(--accent); }
  .down { color: var(--accent3); }

  .ctrls {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-bottom: 12px; padding: 8px 12px;
    background: var(--card); border-radius: 8px; border: 1px solid var(--border);
  }
  .ctrls label { font-size: 11px; color: var(--muted); }
  .ctrls select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 6px; font-size: 11px;
  }

  .chart-card {
    background: var(--card); border-radius: 8px; padding: 12px;
    border: 1px solid var(--border); margin-bottom: 10px;
  }
  .chart-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .chart-wrap { position: relative; width: 100%; height: 280px; }

  .events {
    background: var(--card); border-radius: 8px; padding: 12px;
    border: 1px solid var(--border);
  }
  .events h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .evt {
    display: flex; gap: 8px; padding: 4px 0;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .evt:last-child { border-bottom: none; }
  .evt-date { color: var(--warn); font-weight: 600; min-width: 80px; font-size: 11px; }

  .footer { text-align: center; color: var(--muted); font-size: 10px; margin-top: 16px; padding-top: 10px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🛢️ Oil Market Dashboard</h1>
    <p id="status">Loading...</p>
  </div>
  <div>
    <span class="badge badge-red">⚠️ Hormuz Crisis</span>
    <span class="badge badge-live" id="liveBadge">● Live</span>
    <button class="btn" onclick="refreshAll()">⟳ Refresh</button>
  </div>
</div>

<div class="stats" id="statsRow">
  <div class="stat"><div class="lbl">Brent</div><div class="val" id="sBrent">--</div><div class="chg" id="sBrentChg"></div></div>
  <div class="stat"><div class="lbl">WTI</div><div class="val" id="sWti">--</div><div class="chg" id="sWtiChg"></div></div>
  <div class="stat"><div class="lbl">Spread</div><div class="val" id="sSpread">--</div><div class="chg" id="sSpreadSt"></div></div>
  <div class="stat"><div class="lbl">SPR (M bbl)</div><div class="val" id="sSpr">--</div><div class="chg" id="sSprChg"></div></div>
  <div class="stat"><div class="lbl">Recession Risk</div><div class="val" id="sRec">--</div><div class="chg" id="sRecSt"></div></div>
</div>

<div class="ctrls">
  <label>Range:</label>
  <select id="rangeSel" onchange="redraw()">
    <option value="3m">3 Months</option>
    <option value="6m">6 Months</option>
    <option value="1y">1 Year</option>
    <option value="2y" selected>2 Years</option>
    <option value="all">All Data</option>
  </select>
  <label>Style:</label>
  <select id="styleSel" onchange="redraw()">
    <option value="line">Line</option>
    <option value="area">Area</option>
  </select>
  <label><input type="checkbox" id="evCb" checked onchange="redraw()"> Events</label>
</div>

<div class="chart-card">
  <h3>📈 Brent & WTI Crude Oil Prices</h3>
  <div class="chart-wrap"><canvas id="cPrice"></canvas></div>
</div>
<div class="chart-card">
  <h3>📊 Brent-WTI Spread</h3>
  <div class="chart-wrap"><canvas id="cSpread"></canvas></div>
</div>
<div class="chart-card">
  <h3>🏛️ SPR vs Brent Price</h3>
  <div class="chart-wrap"><canvas id="cSpr"></canvas></div>
</div>
<div class="chart-card">
  <h3>⚠️ Recession Probability</h3>
  <div class="chart-wrap"><canvas id="cRec"></canvas></div>
</div>

<div class="events">
  <h3>📅 Geopolitical Events</h3>
  <div id="evtList"></div>
</div>

<div class="footer">
  <p>DSNCON GmbH · Data from FRED & EIA · Updated <span id="updateTs">--</span></p>
</div>

<script>
document.getElementById('status').textContent = 'Initializing...';

// ============================================================
// EVENTS
// ============================================================
var EVENTS = [
  { d: '2024-10-01', l: 'Iran-Israel proxy escalation', t: 'conflict' },
  { d: '2025-02-15', l: 'US sanctions tighten on Iranian oil', t: 'policy' },
  { d: '2025-06-01', l: 'OPEC+ extends production cuts', t: 'market' },
  { d: '2025-10-01', l: 'Iran nuclear talks collapse', t: 'conflict' },
  { d: '2025-12-15', l: 'Oil breaches $90 on supply fears', t: 'market' },
  { d: '2026-02-28', l: 'US & Israel launch strikes on Iran', t: 'conflict' },
  { d: '2026-03-20', l: 'Iran seizes ships in Strait of Hormuz', t: 'conflict' },
  { d: '2026-04-13', l: 'US naval blockade of Iranian ports', t: 'policy' },
];

// ============================================================
// GENERATE DATA
// ============================================================
function genData() {
  var now = new Date();
  var out = [];
  var brent = 78, wti = 75.5;

  for (var d = new Date('2024-01-01'); d <= now; d.setDate(d.getDate() + 3)) {
    var dt = new Date(d);
    var t = (dt - new Date('2024-01-01')) / (now - new Date('2024-01-01'));
    var trend1 = Math.sin(t * Math.PI * 0.6) * 6;
    var trend2 = t * 18;

    // Oct 2024 spike
    var o24 = Math.max(0, (dt - new Date('2024-10-01')) / (7*86400000));
    var s1 = Math.min(o24 * 0.3, 4) * Math.exp(-Math.max(0, o24 - 20) * 0.03);

    // Oct 2025 spike
    var o25 = Math.max(0, (dt - new Date('2025-10-01')) / (7*86400000));
    var s2 = Math.min(o25 * 0.5, 7) * Math.exp(-Math.max(0, o25 - 15) * 0.02);

    // Hormuz crisis
    var hz = Math.max(0, (dt - new Date('2026-03-20')) / (7*86400000));
    var s3 = Math.min(hz * 2.5, 15);

    var noise = (Math.random() - 0.5) * 2.5;
    brent = 78 + trend1 + trend2 + s1 + s2 + s3 + noise;

    var crisisStart = Math.max(0, (dt - new Date('2026-03-20')) / (7*86400000));
    var spreadWiden = Math.min(crisisStart * 0.6, 8);
    wti = brent - (2.5 + Math.random() * 0.8 + spreadWiden) - Math.random() * 0.5;

    out.push({ date: dt, brent: parseFloat(brent.toFixed(2)), wti: parseFloat(wti.toFixed(2)), spread: parseFloat((brent - wti).toFixed(2)) });
  }
  return out;
}

function genSpr(data) {
  var monthly = {};
  data.forEach(function(d) {
    var key = d.date.getFullYear() + '-' + (d.date.getMonth()+1);
    if (!monthly[key]) monthly[key] = d;
  });
  var dates = Object.keys(monthly).map(function(k) { return monthly[k]; }).sort(function(a,b) { return a.date - b.date; });
  var out = [];
  var val = 385;
  dates.forEach(function(d, i) {
    val -= 0.8 + Math.random() * 0.6;
    if (d.date >= new Date('2025-06-01')) val -= 0.3 + Math.random() * 0.3;
    if (d.date >= new Date('2026-02-28')) val -= 0.5 + Math.random() * 0.4;
    out.push({ date: d.date, value: parseFloat(val.toFixed(1)) });
  });
  return out;
}

function genRec(data) {
  return data.map(function(d) {
    var base = 0.03;
    var shock = Math.max(0, (d.brent - 80) * 0.006);
    var hormuz = d.date >= new Date('2026-03-20') ? 0.08 : 0;
    var noise = (Math.random() - 0.5) * 0.02;
    var p = Math.min(base + shock + hormuz + noise, 0.65);
    return { date: d.date, value: parseFloat((p * 100).toFixed(1)) };
  });
}

// ============================================================
// UTILS
// ============================================================
var rawData = genData();
var sprData = genSpr(rawData);
var recData = genRec(rawData);

function filter(range) {
  var now = new Date();
  var cutoff;
  switch(range) {
    case '3m': cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 3); break;
    case '6m': cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 6); break;
    case '1y': cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 1); break;
    case '2y': cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 2); break;
    default: cutoff = new Date('2024-01-01');
  }
  return {
    p: rawData.filter(function(d) { return d.date >= cutoff; }),
    s: sprData.filter(function(d) { return d.date >= cutoff; }),
    r: recData.filter(function(d) { return d.date >= cutoff; }),
  };
}

function fmtDate(d) {
  if (typeof d === 'string') d = new Date(d);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function fmtShort(d) {
  if (typeof d === 'string') d = new Date(d);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + " '" + String(d.getFullYear()).slice(2);
}

// ============================================================
// DRAW CHARTS
// ============================================================
var charts = {};

function drawAll() {
  var range = document.getElementById('rangeSel').value;
  var style = document.getElementById('styleSel').value;
  var showEv = document.getElementById('evCb').checked;
  var f = filter(range);

  drawPrice(f.p, style);
  drawSpread(f.p, style, showEv);
  drawSpr(f.p, f.s, showEv);
  drawRec(f.r);
  updateStats();
  buildEvents();
  document.getElementById('status').textContent = 'Live as of ' + new Date().toLocaleString();
  document.getElementById('updateTs').textContent = new Date().toLocaleString();
}

function drawPrice(data, style) {
  if (charts.price) charts.price.destroy();

  var labels = data.map(function(d) { return d.date; });
  var fill = style === 'area';

  charts.price = new Chart(document.getElementById('cPrice'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Brent',
          data: data.map(function(d) { return d.brent; }),
          borderColor: '#E63946',
          backgroundColor: 'rgba(230,57,70,0.12)',
          fill: fill,
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.2,
        },
        {
          label: 'WTI',
          data: data.map(function(d) { return d.wti; }),
          borderColor: '#457B9D',
          backgroundColor: 'rgba(69,123,157,0.12)',
          fill: fill,
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.2,
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#e0e6ed', usePointStyle: true, boxWidth: 8 } },
        tooltip: {
          callbacks: {
            title: function(items) { return fmtDate(labels[items[0].dataIndex]); },
            label: function(ctx) { return ctx.dataset.label + ': $' + ctx.parsed.y.toFixed(2); },
          }
        },
      },
      scales: {
        x: {
          ticks: { color: '#8899aa', maxTicksLimit: 8, callback: function(v, i) { return fmtShort(labels[i]); } },
          grid: { color: '#1a2d3d' },
        },
        y: {
          ticks: { color: '#8899aa', callback: function(v) { return '$' + v; } },
          grid: { color: '#1a2d3d' },
        },
      },
    },
  });
}

function drawSpread(data, style, showEv) {
  if (charts.spread) charts.spread.destroy();

  var labels = data.map(function(d) { return d.date; });
  var barColors = data.map(function(d) {
    return d.spread > 8 ? '#E63946' : d.spread > 5 ? '#F4A261' : '#2A9D8F';
  });

  charts.spread = new Chart(document.getElementById('cSpread'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Spread',
        data: data.map(function(d) { return d.spread; }),
        backgroundColor: barColors,
        borderWidth: 0,
        borderRadius: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: function(items) { return fmtDate(labels[items[0].dataIndex]); },
            label: function(ctx) { return 'Spread: $' + ctx.parsed.y.toFixed(2); },
          }
        },
      },
      scales: {
        x: {
          ticks: { color: '#8899aa', maxTicksLimit: 8, callback: function(v, i) { return fmtShort(labels[i]); } },
          grid: { display: false },
        },
        y: {
          ticks: { color: '#8899aa', callback: function(v) { return '$' + v; } },
          grid: { color: '#1a2d3d' },
        },
      },
    },
  });
}

function drawSpr(priceData, sprData, showEv) {
  if (charts.spr) charts.spr.destroy();

  var labels = sprData.map(function(d) { return d.date; });

  // Align price to SPR dates
  var priceMap = {};
  priceData.forEach(function(d) { priceMap[d.date.getTime()] = d.brent; });
  var aligned = sprData.map(function(sd) {
    return { date: sd.date, brent: priceMap[sd.date.getTime()] || null };
  });

  charts.spr = new Chart(document.getElementById('cSpr'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'SPR (M bbl)',
          data: sprData.map(function(d) { return d.value; }),
          borderColor: '#1D3557',
          backgroundColor: 'rgba(29,53,87,0.25)',
          fill: true,
          borderWidth: 3,
          pointRadius: 2,
          pointBackgroundColor: '#1D3557',
          tension: 0.3,
          yAxisID: 'y1',
        },
        {
          label: 'Brent ($)',
          data: aligned.map(function(d) { return d.brent; }),
          borderColor: '#E63946',
          backgroundColor: 'rgba(230,57,70,0.08)',
          fill: true,
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.2,
          yAxisID: 'y',
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#e0e6ed', usePointStyle: true, boxWidth: 8 } },
        tooltip: {
          callbacks: {
            title: function(items) { return fmtDate(labels[items[0].dataIndex]); },
            label: function(ctx) {
              if (ctx.dataset.label.indexOf('SPR') >= 0) return 'SPR: ' + ctx.parsed.y + 'M bbl';
              return 'Brent: $' + (ctx.parsed.y ? ctx.parsed.y.toFixed(2) : 'N/A');
            },
          }
        },
      },
      scales: {
        x: {
          ticks: { color: '#8899aa', maxTicksLimit: 8, callback: function(v, i) { return fmtShort(labels[i]); } },
          grid: { color: '#1a2d3d' },
        },
        y: {
          position: 'left',
          ticks: { color: '#E63946', callback: function(v) { return '$' + v; } },
          grid: { color: '#1a2d3d' },
          title: { display: true, text: 'Price ($/bbl)', color: '#E63946' },
        },
        y1: {
          position: 'right',
          ticks: { color: '#1D3557' },
          grid: { display: false },
          title: { display: true, text: 'SPR (M bbl)', color: '#1D3557' },
        },
      },
    },
  });
}

function drawRec(data) {
  if (charts.rec) charts.rec.destroy();

  var labels = data.map(function(d) { return d.date; });

  charts.rec = new Chart(document.getElementById('cRec'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Recession Probability (%)',
        data: data.map(function(d) { return d.value; }),
        borderColor: '#1D3557',
        backgroundColor: 'rgba(230,57,70,0.3)',
        fill: true,
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#e0e6ed' } },
        tooltip: {
          callbacks: {
            title: function(items) { return fmtDate(labels[items[0].dataIndex]); },
            label: function(ctx) { return 'Recession Prob: ' + ctx.parsed.y.toFixed(1) + '%'; },
          }
        },
      },
      scales: {
        x: {
          ticks: { color: '#8899aa', maxTicksLimit: 8, callback: function(v, i) { return fmtShort(labels[i]); } },
          grid: { color: '#1a2d3d' },
        },
        y: {
          min: 0, max: 70,
          ticks: { color: '#8899aa', callback: function(v) { return v + '%'; } },
          grid: { color: '#1a2d3d' },
        },
      },
    },
  });
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  var last = rawData[rawData.length - 1];
  var prev = rawData[Math.max(0, rawData.length - 5)];
  var sprLast = sprData[sprData.length - 1];
  var sprPrev = sprData.length > 2 ? sprData[sprData.length - 2] : sprLast;
  var recLast = recData[recData.length - 1];

  document.getElementById('sBrent').textContent = '$' + last.brent.toFixed(2);
  var bc = ((last.brent - prev.brent) / prev.brent * 100).toFixed(1);
  document.getElementById('sBrentChg').innerHTML = (bc >= 0 ? '▲' : '▼') + ' ' + Math.abs(bc) + '%';
  document.getElementById('sBrentChg').className = 'chg ' + (bc >= 0 ? 'up' : 'down');

  document.getElementById('sWti').textContent = '$' + last.wti.toFixed(2);
  var wc = ((last.wti - prev.wti) / prev.wti * 100).toFixed(1);
  document.getElementById('sWtiChg').innerHTML = (wc >= 0 ? '▲' : '▼') + ' ' + Math.abs(wc) + '%';
  document.getElementById('sWtiChg').className = 'chg ' + (wc >= 0 ? 'up' : 'down');

  var sp = last.brent - last.wti;
  document.getElementById('sSpread').textContent = '$' + sp.toFixed(2);
  document.getElementById('sSpreadSt').textContent = sp > 8 ? '🔴 Crisis' : sp > 5 ? '🟡 Elevated' : '🟢 Normal';

  document.getElementById('sSpr').textContent = sprLast.value + 'M';
  var sc = (sprLast.value - sprPrev.value).toFixed(1);
  document.getElementById('sSprChg').innerHTML = '▼ ' + Math.abs(sc) + 'M';
  document.getElementById('sSprChg').className = 'chg down';

  document.getElementById('sRec').textContent = recLast.value + '%';
  document.getElementById('sRecSt').textContent = recLast.value > 45 ? '🔴 High Risk' : recLast.value > 25 ? '🟡 Elevated' : '🟢 Low';
}

// ============================================================
// EVENTS
// ============================================================
function buildEvents() {
  var el = document.getElementById('evtList');
  var html = '';
  EVENTS.slice().reverse().forEach(function(ev) {
    html += '<div class="evt"><span class="evt-date">' + ev.d + '</span><span>' + ev.l + '</span></div>';
  });
  el.innerHTML = html;
}

// ============================================================
// REFRESH
// ============================================================
function refreshAll() {
  rawData = genData();
  sprData = genSpr(rawData);
  recData = genRec(rawData);
  Object.keys(charts).forEach(function(k) { if (charts[k]) charts[k].destroy(); });
  drawAll();
  document.getElementById('liveBadge').textContent = '● ' + new Date().toLocaleTimeString();
}

function redraw() {
  Object.keys(charts).forEach(function(k) { if (charts[k]) charts[k].destroy(); });
  drawAll();
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('status').textContent = 'Rendering charts...';
  drawAll();
});
</script>
</body>
</html>
